<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CyberDoc · Network Simulation</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      touch-action: none;
      height: 100vh;
      width: 100vw;
    }

    /* Responsive Navigation Bar */
    #navbar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      padding: 12px 16px;
      z-index: 100;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px 20px;
      border-bottom: 1px solid #00ffff40;
      box-shadow: 0 4px 20px rgba(0,255,255,0.2);
    }

    #navbar a {
      color: #00ffff;
      text-decoration: none;
      font-size: clamp(1rem, 4vw, 1.3rem);
      font-weight: 600;
      text-shadow: 0 0 8px #00ffff;
      transition: 0.2s;
      padding: 4px 8px;
      white-space: nowrap;
    }

    #navbar a:hover {
      color: white;
      text-shadow: 0 0 15px #00ffff;
      background: rgba(0,255,255,0.1);
      border-radius: 20px;
    }

    /* For very small screens (≤400px), stack vertically */
    @media (max-width: 400px) {
      #navbar {
        flex-direction: column;
        gap: 6px;
        padding: 8px;
      }
      #navbar a {
        font-size: 1.1rem;
      }
    }

    #msg {
      position: absolute;
      top: clamp(70px, 15vh, 100px); /* adapt based on navbar height */
      left: 0;
      width: 100%;
      text-align: center;
      color: #00ffff;
      font-size: clamp(18px, 5vw, 28px);
      text-shadow: 0 0 15px #00ffff;
      pointer-events: none;
      z-index: 10;
      padding: 0 16px;
      line-height: 1.3;
    }

    #logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(280px, 70vw);
      max-width: 350px;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      filter: drop-shadow(0 0 20px #00ffff);
      pointer-events: none;
      z-index: 20;
      border-radius: 20px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
  </style>
</head>
<body>

  <div id="navbar">
    <a href="index.html">🏠 HOME</a>
    <a href="about.html">👤 ABOUT</a>
    <a href="projects.html">📁 PROJECTS</a>
    <a href="contact.html">📬 CONTACT</a>
  </div>

  <div id="msg">🔌 connect the network link</div>
  <img id="logo" src="https://i.ibb.co/gMjPN96r/logo.jpg" alt="CyberDoc Logo">

  <canvas id="c"></canvas>

    // The full code is available in our previous messages. Make sure to include it.

</body>
</html>
