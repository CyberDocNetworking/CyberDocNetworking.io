<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact · CyberDoc</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: black;
      color: #00ffff;
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 40px;
      text-shadow: 0 0 8px #00ffff;
    }
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(8px);
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px 25px;
      z-index: 100;
      border-bottom: 1px solid #00ffff40;
    }
    .nav a {
      color: #00ffff;
      text-decoration: none;
      font-size: clamp(1rem, 4vw, 1.3rem);
      font-weight: bold;
      text-shadow: 0 0 8px #00ffff;
      padding: 4px 8px;
      white-space: nowrap;
    }
    .nav a:hover {
      color: white;
      background: rgba(0,255,255,0.1);
      border-radius: 20px;
    }
    @media (max-width: 450px) {
      .nav {
        gap: 8px;
        padding: 8px;
      }
      .nav a {
        font-size: 1rem;
      }
    }
    .content {
      max-width: 600px;
      width: 100%;
      padding: 40px 24px;
      border: 1px solid #00ffff30;
      border-radius: 24px;
      background: rgba(0, 20, 20, 0.6);
      backdrop-filter: blur(4px);
      box-shadow: 0 0 30px #00ffff20;
      text-align: center;
    }
    h1 {
      font-size: clamp(2rem, 8vw, 3rem);
      margin-bottom: 2rem;
    }
    .email {
      font-size: clamp(1.2rem, 5vw, 2rem);
      margin: 30px 0;
      padding: 15px;
      background: rgba(0,255,255,0.1);
      border-radius: 60px;
      word-break: break-all;
      border: 1px dashed #00ffff;
    }
    .social {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px 25px;
      margin: 30px 0 10px;
    }
    .social a {
      color: #00ffff;
      text-decoration: none;
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      padding: 8px 16px;
      border: 1px solid #00ffff40;
      border-radius: 40px;
      transition: 0.2s;
    }
    .social a:hover {
      background: #00ffff20;
      color: white;
    }
  </style>
</head>
<body>
  <div class="nav">
    <a href="index.html">🏠 HOME</a>
    <a href="about.html">👤 ABOUT</a>
    <a href="projects.html">📁 PROJECTS</a>
    <a href="contact.html">📬 CONTACT</a>
  </div>

  <div class="content">
    <h1>📬 Contact</h1>
    <div class="email">📧 cyberdoc@network.io</div>
    <div class="social">
      <a href="#">GitHub</a>
      <a href="#">LinkedIn</a>
      <a href="#">Twitter</a>
    </div>
    <p style="font-size:1.1rem; margin-top:30px;">Open for collaborations & networking talks!</p>
  </div>
</body>
</html>
