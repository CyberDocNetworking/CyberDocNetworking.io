<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tree topology · packet traffic simulation</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
    touch-action: none;
  }
  #msg {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    color: #00ffff;
    font-size: clamp(18px, 4vw, 26px);
    text-shadow: 0 0 10px #00ffff;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.3s;
  }
  #logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: clamp(140px, 45vw, 280px);
    opacity: 0;
    transition: opacity 1s ease-in-out;
    filter: drop-shadow(0 0 15px #00ffff);
    pointer-events: none;
    z-index: 20;
    border-radius: 20px;
  }
  canvas {
    display: block;
    touch-action: none;
  }
</style>
</head>
<body>

<div id="msg">🔌 connect the network link</div>
<img id="logo" src="https://i.ibb.co/gMjPN96r/logo.jpg" alt="logo">

<canvas id="c"></canvas>

<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const msgEl = document.getElementById('msg');
  const logoEl = document.getElementById('logo');

  // ---- initial two nodes (they disappear after connection) ----
  let nodeA = { x: 0, y: 0 };
  let nodeB = { x: 0, y: 0 };

  // ---- hierarchical tree nodes ----
  let router = { x: 0, y: 0 };
  let l3_1 = { x: 0, y: 0 };
  let l3_2 = { x: 0, y: 0 };
  let l2 = [
    { x: 0, y: 0 },
    { x: 0, y: 0 },
    { x: 0, y: 0 },
    { x: 0, y: 0 }
  ];

  // ---- state ----
  let connected = false;          // initial link established
  let extendedVisible = false;    // tree should appear
  let fadeAlpha = 0;              // opacity of tree (0..1)
  let fadeAnimation = null;
  let logoFadeTimer = null;

  // drag state (only active before connection)
  let dragging = false;
  let dragStartNode = null;
  let currentMousePos = { x: 0, y: 0 };

  // ---- packet simulation ----
  let packets = [];
  const MAX_PACKETS = 30;
  const PACKET_SPAWN_PROB = 0.02; // per frame when active
  let packetAnimationFrame = null;
  let packetsActive = false;       // becomes true after tree fully faded in

  // define all links for packet routing (as pairs of node references)
  let links = []; // will be populated in updateNodes

  // ---------- update positions based on window size ----------
  function updateNodes() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    // initial two nodes
    nodeA = { x: w * 0.3, y: h * 0.55 };
    nodeB = { x: w * 0.7, y: h * 0.55 };

    // hierarchical tree layout
    router = { x: w * 0.5, y: h * 0.2 };
    l3_1 = { x: w * 0.35, y: h * 0.4 };
    l3_2 = { x: w * 0.65, y: h * 0.4 };
    l2[0] = { x: w * 0.2, y: h * 0.7 };
    l2[1] = { x: w * 0.4, y: h * 0.7 };
    l2[2] = { x: w * 0.6, y: h * 0.7 };
    l2[3] = { x: w * 0.8, y: h * 0.7 };

    // update links (node references, not coordinates)
    links = [
      { from: router, to: l3_1 },
      { from: router, to: l3_2 },
      { from: l3_1, to: l3_2 },  // redundant link
      { from: l3_1, to: l2[0] },
      { from: l3_1, to: l2[1] },
      { from: l3_2, to: l2[2] },
      { from: l3_2, to: l2[3] }
    ];
  }

  // ---------- resize canvas ----------
  function resizeCanvas() {
    const ratio = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * ratio;
    canvas.height = window.innerHeight * ratio;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    updateNodes();
    // Clear packets on resize to avoid wrong positions
    packets = [];
    packetsActive = false; // will restart when fade complete
    draw();
  }

  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('load', resizeCanvas);

  // ---------- fade animation for extended topology ----------
  function startFadeIn() {
    if (fadeAnimation) cancelAnimationFrame(fadeAnimation);
    const startTime = performance.now();
    const duration = 1000; // 1 sec
    function animateFade(now) {
      const elapsed = now - startTime;
      fadeAlpha = Math.min(elapsed / duration, 1);
      draw();
      if (fadeAlpha < 1) {
        fadeAnimation = requestAnimationFrame(animateFade);
      } else {
        fadeAnimation = null;
        // Tree is fully visible – allow packets to start spawning
        packetsActive = true;
      }
    }
    fadeAnimation = requestAnimationFrame(animateFade);
  }

  // ---------- packet helpers ----------
  function spawnPacket() {
    if (packets.length >= MAX_PACKETS) return;
    // pick random link
    const link = links[Math.floor(Math.random() * links.length)];
    // random direction (0..1) and speed
    const progress = Math.random(); // start anywhere along the link
    const speed = 0.002 + Math.random() * 0.005; // per frame
    const direction = Math.random() < 0.5 ? 1 : -1; // 1 = from->to, -1 = to->from
    packets.push({
      link,
      progress,
      speed,
      direction
    });
  }

  function updatePackets() {
    for (let i = packets.length - 1; i >= 0; i--) {
      const p = packets[i];
      // Move progress
      p.progress += p.speed * p.direction;
      // Bounce at ends
      if (p.progress >= 1) {
        p.progress = 1 - (p.progress - 1);
        p.direction *= -1;
      } else if (p.progress <= 0) {
        p.progress = -p.progress;
        p.direction *= -1;
      }
    }
  }

  // ---------- drawing primitives ----------
  function drawNode(n, alpha = 1.0, label = '') {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(n.x, n.y, 16, 0, Math.PI * 2);
    ctx.fillStyle = '#00ffff';
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#00ffff';
    ctx.fill();
    ctx.restore();

    if (label) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = 'bold 12px Arial';
      ctx.fillStyle = '#aaffff';
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#00ffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(label, n.x, n.y + 20);
      ctx.restore();
    }
  }

  function drawConnection(p1, p2, alpha = 1.0, dash = false, label = '') {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = '#00ffff';
    ctx.lineWidth = dash ? 3 : 2.5;
    if (dash) ctx.setLineDash([6, 4]);
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#00ffff';
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
    ctx.restore();

    if (label) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = '10px Arial';
      ctx.fillStyle = '#88ffff';
      ctx.shadowBlur = 4;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      const mx = (p1.x + p2.x) / 2;
      const my = (p1.y + p2.y) / 2;
      ctx.fillText(label, mx, my - 8);
      ctx.restore();
    }
  }

  function drawPackets() {
    for (let p of packets) {
      const start = p.direction > 0 ? p.link.from : p.link.to;
      const end = p.direction > 0 ? p.link.to : p.link.from;
      const prog = p.direction > 0 ? p.progress : 1 - p.progress;
      const x = start.x + (end.x - start.x) * prog;
      const y = start.y + (end.y - start.y) * prog;

      ctx.save();
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#ffffaa';
      ctx.beginPath();
      ctx.arc(x, y, 6, 0, Math.PI*2);
      ctx.fillStyle = '#ffffaa'; // bright yellow packets
      ctx.fill();
      ctx.restore();
    }
  }

  // ---------- main draw ----------
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // ---- before connection: draw the two nodes and dragging line ----
    if (!connected) {
      drawNode(nodeA, 1.0, '');
      drawNode(nodeB, 1.0, '');

      if (dragging && dragStartNode) {
        const start = dragStartNode === 'A' ? nodeA : nodeB;
        ctx.save();
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 4;
        ctx.setLineDash([8, 8]);
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00ffff';
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(currentMousePos.x, currentMousePos.y);
        ctx.stroke();
        ctx.restore();
      }
    }

    // ---- after connection: tree topology + packets (if faded in) ----
    if (connected && extendedVisible) {
      const a = fadeAlpha; // still used for tree fade-in

      // connections (fade in)
      drawConnection(router, l3_1, a, false, '');
      drawConnection(router, l3_2, a, false, '');
      drawConnection(l3_1, l3_2, a, true, 'redundant');
      drawConnection(l3_1, l2[0], a, false, '');
      drawConnection(l3_1, l2[1], a, false, '');
      drawConnection(l3_2, l2[2], a, false, '');
      drawConnection(l3_2, l2[3], a, false, '');

      // nodes
      drawNode(router, a, 'Router');
      drawNode(l3_1, a, 'L3-1');
      drawNode(l3_2, a, 'L3-2');
      drawNode(l2[0], a, 'L2-1');
      drawNode(l2[1], a, 'L2-2');
      drawNode(l2[2], a, 'L2-3');
      drawNode(l2[3], a, 'L2-4');

      // small layer labels
      ctx.save();
      ctx.globalAlpha = a * 0.8;
      ctx.font = '9px Arial';
      ctx.fillStyle = '#ccffff';
      ctx.shadowBlur = 4;
      ctx.textAlign = 'center';
      ctx.fillText('core', router.x, router.y - 20);
      ctx.fillText('dist', l3_1.x, l3_1.y - 20);
      ctx.fillText('dist', l3_2.x, l3_2.y - 20);
      ctx.fillText('access', l2[0].x, l2[0].y - 20);
      ctx.fillText('access', l2[1].x, l2[1].y - 20);
      ctx.fillText('access', l2[2].x, l2[2].y - 20);
      ctx.fillText('access', l2[3].x, l2[3].y - 20);
      ctx.restore();

      // packets only if tree is fully visible (avoid half-faded packets)
      if (a >= 0.99) {
        drawPackets();
      }
    }

    ctx.setLineDash([]);
  }

  // ---------- animation loop (updates packets and redraws) ----------
  function animationLoop() {
    if (connected && extendedVisible && packetsActive) {
      // spawn new packets randomly
      if (Math.random() < PACKET_SPAWN_PROB) {
        spawnPacket();
      }
      updatePackets();
    }
    draw();
    packetAnimationFrame = requestAnimationFrame(animationLoop);
  }

  // start the loop
  packetAnimationFrame = requestAnimationFrame(animationLoop);

  // ---------- node hit detection (only initial nodes) ----------
  function getNodeAt(x, y) {
    if (!connected) {
      if (Math.hypot(x - nodeA.x, y - nodeA.y) < 30) return 'A';
      if (Math.hypot(x - nodeB.x, y - nodeB.y) < 30) return 'B';
    }
    return null;
  }

  // ---------- event coordinates ----------
  function getClientCoords(e) {
    if (e.touches && e.touches.length > 0) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    if (e.changedTouches && e.changedTouches.length > 0) {
      return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  // ---------- start drag ----------
  function onPointerDown(e) {
    e.preventDefault();
    if (connected) return;
    const p = getClientCoords(e);
    const node = getNodeAt(p.x, p.y);
    if (node) {
      dragging = true;
      dragStartNode = node;
      currentMousePos = { x: p.x, y: p.y };
      draw();
    }
  }

  // ---------- move ----------
  function onPointerMove(e) {
    if (!dragging || connected) return;
    e.preventDefault();
    const p = getClientCoords(e);
    currentMousePos = { x: p.x, y: p.y };
    draw();
  }

  // ---------- end drag (connection attempt) ----------
  function onPointerUp(e) {
    if (!dragging || connected) {
      dragging = false;
      dragStartNode = null;
      draw();
      return;
    }

    e.preventDefault();
    const p = getClientCoords(e);
    const endNode = getNodeAt(p.x, p.y);

    if (dragStartNode && endNode && dragStartNode !== endNode) {
      // SUCCESS: initial link established
      connected = true;
      extendedVisible = true;
      msgEl.innerText = '✅ tree topology · packets flowing';

      // logo fades in, then out after 2 seconds
      logoEl.style.opacity = 1;
      if (logoFadeTimer) clearTimeout(logoFadeTimer);
      logoFadeTimer = setTimeout(() => {
        logoEl.style.opacity = 0;
        logoFadeTimer = null;
      }, 2000);

      fadeAlpha = 0;
      startFadeIn();
    }

    dragging = false;
    dragStartNode = null;
    draw();
  }

  // ---------- cancel ----------
  function onPointerCancel(e) {
    if (dragging) {
      dragging = false;
      dragStartNode = null;
      draw();
    }
  }

  // ---------- events ----------
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('mouseleave', onPointerCancel);

  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  canvas.addEventListener('touchend', onPointerUp);
  canvas.addEventListener('touchcancel', onPointerCancel);

  canvas.addEventListener('contextmenu', (e) => e.preventDefault());

  // make sure to clean up animation frame on page unload (optional)
  window.addEventListener('beforeunload', () => {
    if (packetAnimationFrame) cancelAnimationFrame(packetAnimationFrame);
  });

  // initial call
  resizeCanvas();
})();
</script>
</body>
</html>
